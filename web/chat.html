<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Chat</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      margin: 0;
      background: #f5f7fb;
      color: #222;
    }
    .wrap {
      max-width: 900px;
      margin: 20px auto;
      padding: 16px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,.06);
      padding: 16px;
      margin-bottom: 16px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 20px;
    }
    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .row > * {
      flex: 1 1 180px;
    }
    input, select, textarea, button {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      border: 1px solid #dcdfe6;
      border-radius: 8px;
      font-size: 14px;
    }
    textarea {
      min-height: 90px;
      resize: vertical;
    }
    button {
      cursor: pointer;
      background: #2563eb;
      color: white;
      border: none;
      font-weight: 600;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .msg {
      white-space: pre-wrap;
      line-height: 1.6;
      background: #fafafa;
      border: 1px solid #eee;
      border-radius: 10px;
      padding: 12px;
    }
    .small {
      color: #666;
      font-size: 12px;
      margin-top: 8px;
    }
    .err {
      color: #b91c1c;
    }
    .ok {
      color: #166534;
    }
    .bubble {
      padding: 10px 14px;
      border-radius: 10px;
      margin: 6px 0;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      max-width: 85%;
    }
    .bubble-user {
      background: #2563eb;
      color: #fff;
      margin-left: auto;
      text-align: right;
    }
    .bubble-bot {
      background: #f1f5f9;
      color: #222;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>本地 RAG 对话测试</h1>
      <div class="row">
        <div>
          <label>模式</label>
          <select id="mode">
            <option value="full" selected>full（答全）</option>
            <option value="brief">brief（简洁）</option>
          </select>
        </div>
        <div>
          <label>Debug</label>
          <select id="debug">
            <option value="false" selected>false</option>
            <option value="true">true</option>
          </select>
        </div>
      </div>

      <div style="margin-bottom:10px;">
        <label>问题</label>
        <textarea id="question" placeholder="例如：非罗奥 怎么验真伪"></textarea>
      </div>

      <div class="row">
        <div><button id="askBtn">发送问题</button></div>
        <div><button id="healthBtn" style="background:#475569;">检查 /health</button></div>
      </div>
      <div class="small">当前页面会向 <code>/ask</code> 发送请求。</div>
    </div>

    <div class="card" id="chatCard">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <strong>对话记录</strong>
        <button id="clearBtn" style="width:auto;padding:4px 12px;background:#94a3b8;font-size:12px;">清空对话</button>
      </div>
      <div id="chatLog" style="margin-top:10px;max-height:500px;overflow-y:auto;"></div>
      <div id="status" class="small"></div>
    </div>

    <div class="card">
      <div><strong>调试信息（可选）</strong></div>
      <div id="debugBox" class="msg" style="margin-top:10px;">（无）</div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    // 对话历史（发送给后端的 history 字段）
    let chatHistory = [];
    const MAX_HISTORY = 10;

    function addBubble(text, role) {
      const el = document.createElement("div");
      el.className = "bubble " + (role === "user" ? "bubble-user" : "bubble-bot");
      el.textContent = text;
      $("chatLog").appendChild(el);
      $("chatLog").scrollTop = $("chatLog").scrollHeight;
    }

    function clearChat() {
      chatHistory = [];
      $("chatLog").innerHTML = "";
      $("debugBox").textContent = "（无）";
      $("status").textContent = "";
    }

    async function callHealth() {
      $("status").textContent = "请求 /health ...";
      try {
        const res = await fetch("/health");
        const data = await res.json();
        $("status").innerHTML = '<span class="ok">/health 正常</span>';
        addBubble(JSON.stringify(data, null, 2), "bot");
      } catch (e) {
        $("status").innerHTML = '<span class="err">/health 失败</span>';
      }
    }

    async function ask() {
      const question = $("question").value.trim();
      if (!question) {
        $("status").innerHTML = '<span class="err">请输入问题</span>';
        return;
      }

      // 显示用户气泡
      addBubble(question, "user");
      $("question").value = "";

      const body = {
        question,
        mode: $("mode").value,
        debug: $("debug").value === "true",
        history: chatHistory.slice(-MAX_HISTORY),
      };

      $("askBtn").disabled = true;
      $("status").textContent = "请求中...";
      $("debugBox").textContent = "（无）";

      try {
        const res = await fetch("/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });

        if (!res.ok) {
          $("status").innerHTML = `<span class="err">HTTP ${res.status}</span>`;
          addBubble("请求失败: HTTP " + res.status, "bot");
          return;
        }

        const data = await res.json();
        const answer = data.answer || "（无回答）";

        if (data.ok) {
          $("status").innerHTML = `<span class="ok">成功</span>`;
        } else {
          $("status").innerHTML = `<span class="err">失败</span>`;
        }

        // 显示回答气泡
        addBubble(answer, "bot");

        // 更新对话历史
        chatHistory.push({ role: "user", content: question });
        chatHistory.push({ role: "assistant", content: answer.slice(0, 300) });
        // 保持历史在限制范围内
        if (chatHistory.length > MAX_HISTORY * 2) {
          chatHistory = chatHistory.slice(-MAX_HISTORY * 2);
        }

        if (data.debug) {
          $("debugBox").textContent = JSON.stringify(data.debug, null, 2);
        }
      } catch (e) {
        $("status").innerHTML = '<span class="err">请求异常</span>';
        addBubble("请求异常: " + String(e), "bot");
      } finally {
        $("askBtn").disabled = false;
        $("question").focus();
      }
    }

    $("askBtn").addEventListener("click", ask);
    $("healthBtn").addEventListener("click", callHealth);
    $("clearBtn").addEventListener("click", clearChat);

    // 回车发送（Shift+Enter 换行）
    $("question").addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        ask();
      }
    });
  </script>
</body>
</html>
